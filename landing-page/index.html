<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عبدالملك المخلافي | قريباً</title>
    <!-- Google Fonts: Cairo & Reem Kufi -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Reem+Kufi:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold-primary: #b18c39;
            --main-bg: #fafaf9; /* Main site background */
            --text-main: #1c1917; /* Main site text */
            --text-muted: #57534e; /* Muted text */
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Cairo', sans-serif;
            background-color: var(--main-bg);
            color: var(--text-main);
            overflow-x: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Subtle grid background */
        .grid-bg {
            position: absolute;
            inset: 0;
            background-size: 30px 30px;
            background-image: linear-gradient(to right, rgba(0, 0, 0, 0.03) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(0, 0, 0, 0.03) 1px, transparent 1px);
            z-index: 0;
            mask-image: radial-gradient(circle at center, black, transparent 80%);
            -webkit-mask-image: radial-gradient(circle at center, black, transparent 80%);
        }

        .container {
            z-index: 10;
            padding: 2rem;
            max-width: 650px;
            text-align: center;
            animation: fadeUp 1s ease-out forwards;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-container {
            margin-bottom: 2rem;
        }

        .logo {
            max-width: 220px;
            height: auto;
            position: relative;
        }

        h1 {
            font-family: 'Reem Kufi', sans-serif;
            font-size: 3.5rem;
            margin: 0 0 1rem 0;
            color: var(--gold-primary);
            font-weight: 700;
            letter-spacing: 0px;
        }

        .subtitle {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--text-muted);
            line-height: 1.8;
            margin-bottom: 2.5rem;
        }

        .highlight {
            color: var(--text-main);
            font-weight: 900;
            border-bottom: 2px solid rgba(177, 140, 57, 0.3);
            padding-bottom: 2px;
            transition: border-color 0.3s;
        }
        
        .highlight:hover {
            border-color: var(--gold-primary);
        }

        .progress-box {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: #ffffff;
            border: 1px solid rgba(177, 140, 57, 0.2);
            padding: 1rem 2rem;
            border-radius: 100px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            backdrop-filter: blur(10px);
        }

        .dot {
            width: 10px;
            height: 10px;
            background-color: var(--gold-primary);
            border-radius: 50%;
            animation: pulse-dot 2s infinite;
        }

        @keyframes pulse-dot {
            0% { box-shadow: 0 0 0 0 rgba(177, 140, 57, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(177, 140, 57, 0); }
            100% { box-shadow: 0 0 0 0 rgba(177, 140, 57, 0); }
        }

        .status-text {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-main);
        }

        /* Decorative line */
        .divider {
            width: 60px;
            height: 3px;
            background: var(--gold-primary);
            margin: 0 auto 2rem auto;
            border-radius: 2px;
        }

        @media (max-width: 768px) {
            h1 { font-size: 2.8rem; }
            .subtitle { font-size: 1.15rem; }
            .logo { max-width: 180px; }
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>

    <div class="container">
        <div class="logo-container">
            <img src="logo.png" alt="شعار عبدالملك المخلافي" class="logo">
        </div>

        <div class="divider"></div>

        <h1>قريباً</h1>
        
        <p class="subtitle">
            نضع اللمسات الأخيرة لإطلاق المنصة الرقمية؛ لتكون مساحة فكرية وتوثيقية تجمع <span class="highlight">المسيرة الوطنية والفكرية</span>، وحصاد المقالات والدراسات، ومحطات العمل السياسي للأستاذ عبـدالملك المخـلافي.
        </p>

        <div class="progress-box">
            <span class="dot"></span>
            <span class="status-text">الموقع قيد التجهيز...</span>
        </div>
    </div>
</body>
</html>
